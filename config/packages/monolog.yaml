monolog:
  channels: ["deprecation"]

  handlers:
    main:
      type: rotating_file
      path: "%kernel.logs_dir%/%kernel.environment%.log"
      level: debug
      channels: ["!event", "!deprecation", "!security"]
      max_files: 5
      formatter: monolog.formatter.session_request

    deprecation:
      type: rotating_file
      path: "%kernel.logs_dir%/deprecations.log"
      level: info
      channels: ["deprecation"]
      max_files: 5
      formatter: monolog.formatter.session_request

    security:
      type: rotating_file
      path: "%kernel.logs_dir%/security.log"
      level: debug
      channels: ["security"]
      max_files: 5
      formatter: monolog.formatter.session_request

    console:
      type: console
      process_psr_3_messages: false
      channels: ["!event", "!doctrine", "!console", "!deprecation", "!security"]
