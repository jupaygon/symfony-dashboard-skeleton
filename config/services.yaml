imports:
    - { resource: brands.yaml }

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Model/'
            - '../src/Domain/ValueObject/'
            - '../src/Kernel.php'

    # Domain port bindings
    App\Domain\Port\UserRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\UserRepository

    # Branding
    App\Infrastructure\Branding\BrandResolver:
        arguments:
            $brandDefs: '%brands_defs%'
            $brandMap: '%brands_map%'
            $defaultBrand: '%brands_default%'
            $devSuffixes: '%brands_dev_allowed_suffixes%'
