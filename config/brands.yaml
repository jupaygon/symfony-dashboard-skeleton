parameters:
    # Suffixes allowed in dev to resolve brands from worktree hostnames
    # e.g. wt-my-project-fix.symfony-dashboard-skeleton.test → strips suffix, looks up map
    brands_dev_allowed_suffixes: []

    brands_default: 'default'
    brands_map:
        # hostname: brand_key
        # Map production and local hostnames to their brand
        # 'dashboard.example.com': 'default'
        # 'dashboard.example.local': 'default'
        # 'dark.example.com': 'jarvis'
        # 'dark.example.local': 'jarvis'
    brands_defs:
        default:
            name: 'Dashboard'
        jarvis:
            name: 'Dashboard (Dark)'
